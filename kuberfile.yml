apiVersion: apps/v1
kind: Deployment
metadata:
  name: war5-pod
spec:
  strategy:
    type: RollingUpdate
  replicas: 2
  selector:
    matchLabels:
      app: don
  template:
    metadata:
      name: don1
      labels:
        app: don
    spec:
      containers:
        - name: appy
          image: armcool004/war5
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: war5-svc
spec:
  type: NodePort
  selector:
    app: don
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30785

