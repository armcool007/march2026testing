apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-deploy
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      name: amazing
  template:
    metadata:
      labels:
        name: amazing
    spec:
      containers:
        - name: amazon-app-con
          image: armcool004/amazon-app-con
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: amazon-svc
spec:
  type: NodePort
  selector:
    name: amazing
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30785

