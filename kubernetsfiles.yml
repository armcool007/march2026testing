apiVersion: apps/v1
kind: Deployment
metadata:
  name: war-pod
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: war4
  template:
    metadata:
      name: appname
      labels:
        app: war4
    spec:
      containers:
        - name: appwar4
          image: armcool004/war4
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: war-svc
spec:
  type: NodePort
  selector:
    app: war4
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30785
